<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2 class="brand-title">Tun<span>Job</span> Portal</h2>
      <p class="brand-subtitle">Connectez-vous pour accéder à votre espace membre</p>
    </div>

    <!-- 🟢 BANDEAU VERT : Apparaît suite au clic dans le mail (?verified=true) -->
    <div *ngIf="isEmailVerified" class="alert-box alert-success">
      ✅ Votre adresse e-mail a été validée avec succès ! Vous pouvez maintenant vous connecter.
    </div>

    <!-- 🔴 BANDEAU ROUGE : Apparaît si le compte n'est pas activé (403) ou identifiants faux -->
    <div *ngIf="errorMessage" class="alert-box alert-error">
      ⚠️ {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit($event)" class="login-form">
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="credentials.email" 
          placeholder="exemple@domaine.tn" 
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="credentials.password" 
          placeholder="••••••••" 
          required
        >
      </div>

      <button type="submit" class="btn-submit">S'authentifier</button>
    </form>

    <div class="login-footer">
      <p>Pas encore de compte ? <a (click)="goToRegister()">S'inscrire</a></p>
    </div>
  </div>
</div>
